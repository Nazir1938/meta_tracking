name: meta_tracking
description: Meta Tracking - Heyvan İzləmə Sistemi
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  google_maps_flutter: ^2.9.0
  shared_preferences: ^2.3.3
  image_picker: ^1.2.1
  path_provider: ^2.1.4
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0
  logger: ^2.4.0
  iconsax: ^0.0.8
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  firebase_storage: ^12.4.10
  flutter_local_notifications: ^21.0.0
  battery_plus: ^7.0.0
  flutter_launcher_icons: ^0.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# ─────────────────────────────────────────────
# MetaFarm App Icon Konfiqurasiyası
# ─────────────────────────────────────────────
flutter_launcher_icons:
  # Mənbə şəkil (assets/app_icon/app.png)
  image_path: "assets/app_icon/app.png"

  # ── Android ──────────────────────────────
  android: true
  # Android 8.0+ (API 26+) uyğunlaşdırılmış ikon
  adaptive_icon_foreground: "assets/app_icon/app.png"
  adaptive_icon_background: "#1A6420" # tünd yaşıl - MetaFarm rəngi
  adaptive_icon_monochrome: "assets/app_icon/app.png"

  # ── iOS ──────────────────────────────────
  ios: true
  remove_alpha_ios: true # iOS şəffaf fonu qəbul etmir

  # ── Web (əlavə olaraq) ───────────────────
  web:
    generate: true
    image_path: "assets/app_icon/app.png"
    background_color: "#1A6420"
    theme_color: "#1A6420"

  # ── Windows (əlavə olaraq) ───────────────
  windows:
    generate: true
    image_path: "assets/app_icon/app.png"
    icon_size: 48

flutter:
  uses-material-design: true

  # App ikonunun asset kimi qeydiyyatı
  assets:
    - assets/app_icon/
